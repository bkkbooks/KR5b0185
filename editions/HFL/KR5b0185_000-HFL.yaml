front:
  text: 玄靈轉經晚朝行道儀
  hash: sha256:f4bf4b320bd032aef360c3286e57bda9306354e20c8dac5a2795733336bb216a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0185_HFL_000-001a, image: hfl/0267/0267-063.png}
body:
  text: 法事如式各禮師存念如法請宣神呪北上太玄五炁徘徊寳華五重流光煥輝靈景鬰秀洞映太微仰注我身内府鮮開安鎭靈宅萬神總歸身生羽服舉形仙飛鳴法鼓二十四通無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神眞臣今晚朝陞壇行道朝謁帝眞欽奉其諸丹悃具載緘謄願得太上至眞道炁靈寳瑞光下降流入臣等身中令臣所啓之誠速逹徑御至眞無極大道三清上聖紫微北極大帝北斗九皇星君御前請稱法位具位臣姓某與臨壇官衆等謹同誠上啓太上無極大道斗極祖師元始天尊斗極玄師靈寳天尊斗極宗師道德天尊昊天玉皇上帝紫微天皇大帝北極紫微大帝斗中高上玉皇尊星君太微玉帝北極玄卿大帝君北斗天英貪狼太星君北斗天任巨門元星君北斗天樞禄存眞星君北斗天心文曲紐星君北斗天禽㢘貞綱星君北斗天輔武曲紀星君北斗天衝破軍關星君北斗洞明左輔星君北斗隱光右弼星君九皇夫人九隂内妃天罡大聖萬眞節度奎光帝君北斗中三台華蓋星君當生本命星君南極老人夀德星君上清福德星君上清祿德星君帝座照臨星宰二十八宿星君六十甲子星君道德玄曹官君聖衆玄中大法師眞君三天大法師眞君中天九省諸相丈人左右繡衣使者擎羊陀羅使者四直玉文功曹通事舍人斗中千乘萬騎一切眞靈恭望洪慈俯垂洞鑒臣聞中極流輝左垣煥彩混元啓運呈鶴鳴玉局之祥正一承流演龍漢瑶編之祕由兹經訣徧徹堪輿修正道以入仙宗度天民而示妙法日星有耀雨露無私臣等幸際法橋稟依聖造既緝熙於帝化盍宣暢於皇風以今欽奉綸音崇修金籙臣等肅嚴琳宇聿建瑶壇種種香花旌請命祈恩之悃巍巍功德企延生注福之私庸扣首於大鈞希留心於皇極以今晚朝陞壇行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至眞道寳大羅元始天尊紫微上宮天皇大帝玉斗二帝九皇星君清微天宮眞仙聖衆臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德上祝皇帝陛下伏願八極拱辰三靈輔德龜圖九範天開聖瑞於河清虎拜萬年帝闢神畿於地大今故燒香自皈依師尊大聖衆至眞之德得道之後保天長存和與道合眞以今晚朝陞壇行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳玉宸道君靈寳天尊紫微中宫北極大帝當生本命元辰星君帝座照臨星宰禹餘天宮眞仙聖衆臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德敬祝皇太子殿下伏願福𣗳日新善芽春長天錫純嘏合正炁於七元帝與九齡沐靈光於十極金鼎胤虚無之寳玉田融玄妙之珠湛露飛霄潤月殿星垣而咸若卿雲凝曉覆金枝玉葉以常寜今故燒香自皈依師尊大聖衆至眞之德得道之後保天長存和與道合眞以今晚朝陞壇行道請法衆等運兹三捻上香願此香煙騰空徑上供養至眞無上師寳五靈玄老道德天尊南極老人夀德星君上清福德星君上清祿德星君大赤天宮眞仙聖衆臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德歸流九州四海動植含靈伏願正道涵濡玄恩披拂梯航歸化慕衣冠禮樂之風山澤同仁脫鱗介羽毛之累今故燒香自皈依師尊大聖衆至眞之德得道之後永保長生和與道合眞三皈依經心開悟解受持讀誦志心皈依十方道寳當願衆生起心囘向一切信禮師普上法橋無有障礙宿命賛臣等謹按經云遇本命生辰吿身中元辰驛馬削落三災九戹保見今眷屬安寜悔過虔恭漸登妙果以今欽奉綸音崇修金籙祝夀延禧臣等謹率在壇清衆轉誦太上玄靈北斗本命延生眞經各一過上祝中天大聖第七上帝府天衝破軍玉晨君乞爲削落東震三綠大火分野一切之戹仰希矜軫俯賜允俞臣等不勝激切之至修行經法敷座賛題經誦經畢解座賛臣等向來祗率清衆陞壇行道上祝聖夀萬安轉誦太上玄靈北斗本命延生眞經各一過並巳周圎恭望福夀資命善果臻身人各運誠旋行讃詠歩虚引至東方上香旋行復位七元覆護天尊臣等謹按經云本命限期可以消災懴罪請福延生持此眞經随力章醮福德增崇以今欽奉綸音崇修金籙祝夀延禧臣等謹率在壇清衆轉誦太上玄靈北斗本命延生眞經各一過上祝中天大聖第八玉帝府天内外輔玉晨君乞爲削落西南坤位二黑鶉尾實沈分野一切之戹仰希矜軫俯賜允俞臣等不勝激切之至修行經法敷座賛題經誦經畢解座賛臣等向來祗率清衆陞壇行道上祝聖夀萬安轉誦太上玄靈北斗本命延生眞經各一過並巳周圎恭望福夀資命善果臻身人各運誠旋行讃詠歩虚引至西南方上香旋行復位大慈延夀天尊臣等謹按經云凡有男女於本命生辰及諸齋日清淨身心焚香持此眞文自認北極本命星君隨心禱祝善無不應以今欽奉綸音崇修金籙祝夀延禧臣等謹率在壇清衆轉誦太上玄靈北斗本命延生眞經各一過上祝中天大聖苐九大帝府天蓬内弼玉晨君乞爲削落北坎一白玄枵分野一切之戹仰希矜軫俯賜允俞臣等不勝激切之至修行經法敷座賛題經誦經畢解座賛臣等向來祗率清衆陞壇行道上祝聖夀萬安轉誦太上玄靈北斗本命延生眞經各一過並巳周圎恭望福夀資命善果臻身人各運誠旋行讃詠歩虚引至北方上香旋行復位玄都萬夀天尊仰惟中天大聖斗極高眞願運洪慈俯垂淵鑒臣等向來欽奉綸音崇修金籙祝夀延禧轉誦太上玄靈北斗本命延生眞經九過上祝九皇玉晨道君削落九宫分野一切災戹並巳周圎伏願淵聽潜通聖心洞鑒星橋輝貫玉衡宻運於魁罡雲漢昭囘天駟旁驂於輪輻六甲六丁之侍衞斗魂斗魄之禁壇二十四戹靈官擁森羅之鹵簿百千萬重道炁乘赫奕之旌旄不違只尺之私式副再三之禱享九五箕疇之盛等八千莊筭之長自天祐之吉無不利稽首皈依聞經讃詠三聞經天長地久海晏河清聞經巳後當願聖夀萬安皇圖鞏固金枝蕃衍寳曆綿洪發願存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來晚朝轉經行道之所自然生金液丹碧芝英百靈衆眞交㑹在此香火鑪前當願丹誠感格鴻貺潜敷聖夀萬安皇圖永固十方仙童王女接侍蘭煙傳臣向來所奏之誠速逹徑御至眞無極大道三清上聖紫微北極大帝北斗九皇星君御前出堂頌玄靈轉經晚朝行道儀
